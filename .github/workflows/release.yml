name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          version="${GITHUB_REF_NAME}"
          ldflags="-s -w -X github.com/BenjaminBenetti/fleet-man/internal/version.Version=${version}"

          GOOS=linux GOARCH=amd64 go build -ldflags "${ldflags}" -o dist/fleet-linux-amd64 ./cmd/fleet
          GOOS=linux GOARCH=arm64 go build -ldflags "${ldflags}" -o dist/fleet-linux-arm64 ./cmd/fleet

          cd dist
          sha256sum fleet-* > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "Fleet ${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*

  pages:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage site with version injection
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p _site
          cp -r web/. _site/

          # Inject a runtime placeholder-replacement script before </body>.
          # Walks all text nodes and swaps ${version} with the release tag.
          python3 - <<'PY'
          import os

          version = os.environ["VERSION"]
          path = "_site/index.html"

          script = (
              "<script>\n"
              "(function () {\n"
              f"  var v = {version!r};\n"
              "  var token = '${version}';\n"
              "  function replace(root) {\n"
              "    if (!root) return;\n"
              "    var w = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);\n"
              "    var n;\n"
              "    while ((n = w.nextNode())) {\n"
              "      if (n.nodeValue.indexOf(token) !== -1) {\n"
              "        n.nodeValue = n.nodeValue.split(token).join(v);\n"
              "      }\n"
              "    }\n"
              "  }\n"
              "  function run() { replace(document.body); }\n"
              "  run();\n"
              "  var obs = new MutationObserver(function (muts) {\n"
              "    for (var i = 0; i < muts.length; i++) {\n"
              "      var m = muts[i];\n"
              "      if (m.type === 'characterData') {\n"
              "        if (m.target.nodeValue && m.target.nodeValue.indexOf(token) !== -1) {\n"
              "          m.target.nodeValue = m.target.nodeValue.split(token).join(v);\n"
              "        }\n"
              "      } else {\n"
              "        for (var j = 0; j < m.addedNodes.length; j++) {\n"
              "          var node = m.addedNodes[j];\n"
              "          if (node.nodeType === 3) {\n"
              "            if (node.nodeValue && node.nodeValue.indexOf(token) !== -1) {\n"
              "              node.nodeValue = node.nodeValue.split(token).join(v);\n"
              "            }\n"
              "          } else if (node.nodeType === 1) {\n"
              "            replace(node);\n"
              "          }\n"
              "        }\n"
              "      }\n"
              "    }\n"
              "  });\n"
              "  obs.observe(document.body, { childList: true, subtree: true, characterData: true });\n"
              "})();\n"
              "</script>\n"
          )

          with open(path, "r", encoding="utf-8") as f:
              html = f.read()

          if "</body>" in html:
              html = html.replace("</body>", script + "</body>", 1)
          else:
              html += "\n" + script

          with open(path, "w", encoding="utf-8") as f:
              f.write(html)
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
